<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<title>Treino Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222;
    --surface3: #2a2a2a;
    --border: #2e2e2e;
    --text: #e8e8e8;
    --muted: #777;
    --accent: #e03030;
    --accent-dim: rgba(224,48,48,0.13);
    --green: #3ecf8e;
    --green-dim: rgba(62,207,142,0.13);
    --yellow: #f5c842;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── TOP BAR ── */
  .topbar {
    padding: calc(var(--safe-top) + 14px) 20px 14px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .topbar-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 0.02em;
  }

  .topbar-title span { color: var(--accent); }

  .week-label {
    font-size: 12px;
    color: var(--muted);
    background: var(--surface2);
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* ── WEEK STRIP ── */
  .week-strip {
    padding: 16px 20px 0;
    flex-shrink: 0;
  }

  .week-strip-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .days-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    margin-bottom: 16px;
  }

  .day-chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px 2px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }

  .day-chip .dc-name {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
  }

  .day-chip .dc-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--surface3);
    transition: all 0.2s;
  }

  .day-chip.done { background: var(--green-dim); border-color: rgba(62,207,142,0.25); }
  .day-chip.done .dc-name { color: var(--green); }
  .day-chip.done .dc-dot { background: var(--green); box-shadow: 0 0 6px rgba(62,207,142,0.5); }

  .day-chip.today { border-color: rgba(255,255,255,0.15); }
  .day-chip.today .dc-name { color: #ccc; }

  /* ── FICHA TABS ── */
  .ficha-tabs {
    display: flex;
    gap: 8px;
    padding: 0 20px 16px;
    flex-shrink: 0;
  }

  .ftab {
    flex: 1;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 8px 0;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }

  .ftab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .ftab.completed { border-color: rgba(62,207,142,0.3); color: var(--green); }
  .ftab.completed::after { content: ' ✓'; }

  /* ── SCROLL AREA ── */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0 20px calc(var(--safe-bottom) + 100px);
  }

  .scroll-area::-webkit-scrollbar { display: none; }

  /* ── SECTION LABEL ── */
  .sec-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    padding: 14px 0 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2px;
  }

  /* ── EXERCISE ROW ── */
  .ex-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 0;
    border-bottom: 1px solid var(--border);
  }

  .ex-row:last-of-type { border-bottom: none; }

  .ex-thumb-wrap {
    width: 52px;
    height: 52px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    flex-shrink: 0;
    overflow: hidden;
  }

  .ex-thumb {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .ex-thumb-wrap.no-img .ex-thumb { display: none; }

  .ex-info { flex: 1; min-width: 0; }

  .ex-name {
    font-weight: 600;
    font-size: 14px;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }

  .ex-meta {
    font-size: 11px;
    color: var(--muted);
  }

  .ex-meta .series { color: #aaa; }

  /* ── CARGA INPUT ── */
  .carga-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
    flex-shrink: 0;
  }

  .carga-label {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  .carga-input-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .carga-input {
    width: 64px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--yellow);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    text-align: center;
    padding: 5px 4px;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  .carga-input:focus {
    border-color: var(--yellow);
    background: rgba(245,200,66,0.06);
  }

  .carga-input::placeholder { color: var(--surface3); font-size: 14px; }

  .carga-unit {
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
  }

  /* ── CARDIO BLOCK ── */
  .cardio-block {
    margin-top: 12px;
    background: rgba(74,158,255,0.07);
    border: 1px solid rgba(74,158,255,0.18);
    border-radius: 10px;
    overflow: hidden;
  }

  .cardio-block-header {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(74,158,255,0.15);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .cardio-block-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #4a9eff;
  }

  .cardio-block-meta { font-size: 11px; color: var(--muted); }

  .cardio-protocol { padding: 12px 16px; }

  .hiit-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .hiit-table th { text-align: left; color: var(--muted); font-weight: 600; padding: 4px 6px; border-bottom: 1px solid var(--border); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
  .hiit-table td { padding: 5px 6px; border-bottom: 1px solid rgba(255,255,255,0.04); color: #ccc; }
  .hiit-table tr:last-child td { border-bottom: none; }
  .phase-aquecimento td:first-child { color: var(--yellow); font-weight: 600; }
  .phase-sprint td:first-child { color: var(--accent); font-weight: 600; }
  .phase-recup td:first-child { color: var(--green); font-weight: 600; }
  .phase-desacele td:first-child { color: #4a9eff; font-weight: 600; }

  /* ── DONE BUTTON ── */
  .done-btn-wrap {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    padding: 12px 20px calc(var(--safe-bottom) + 12px);
    background: linear-gradient(to top, var(--bg) 70%, transparent);
    z-index: 20;
  }

  .done-btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .done-btn:active { transform: scale(0.98); opacity: 0.9; }
  .done-btn.is-done { background: #1a3a2a; border: 1px solid rgba(62,207,142,0.3); color: var(--green); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--green);
    color: #0a1f14;
    font-weight: 700;
    font-size: 14px;
    padding: 10px 20px;
    border-radius: 24px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── HISTORY VIEW ── */
  .history-panel {
    display: none;
    padding: 0 20px calc(var(--safe-bottom) + 80px);
    overflow-y: auto;
    flex: 1;
    -webkit-overflow-scrolling: touch;
  }

  .history-panel.active { display: block; }
  .history-panel::-webkit-scrollbar { display: none; }

  .hist-week {
    margin-bottom: 24px;
  }

  .hist-week-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 16px 0 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
  }

  .hist-entry {
    background: var(--surface);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }

  .hist-entry-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .hist-ficha-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 800;
    color: var(--accent);
  }

  .hist-date {
    font-size: 11px;
    color: var(--muted);
  }

  .hist-ex-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .hist-ex-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
  }

  .hist-ex-name { color: #bbb; }
  .hist-ex-carga { color: var(--yellow); font-weight: 600; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; }

  .empty-hist {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.8;
  }

  .empty-hist .big { font-size: 40px; margin-bottom: 12px; }

  /* ── NAV BAR ── */
  .navbar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: var(--safe-bottom);
    z-index: 30;
  }

  .nav-btn {
    flex: 1;
    padding: 12px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--muted);
    transition: color 0.15s;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .nav-btn .nav-icon { font-size: 20px; line-height: 1; }
  .nav-btn.active { color: var(--accent); }

  /* ── PAGES ── */
  .page { display: none; flex-direction: column; height: 100%; overflow: hidden; }
  .page.active { display: flex; }

</style>
</head>

<!-- ══════════ PAGE: TREINO ══════════ -->
<div class="page active" id="page-treino">

  <div class="scroll-area" id="scroll-area"></div>

  <div class="done-btn-wrap">

</div>

<!-- ══════════ PAGE: HISTÓRICO ══════════ -->
<div class="page" id="page-hist">

    <div class="topbar-title">HISTÓRICO</div>
    <div class="week-label" id="clear-btn" onclick="clearHistory()" style="cursor:pointer;color:#e03030;">Limpar</div>
  </div>
  <div class="history-panel active" id="history-panel"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- NAVBAR -->
<div class="navbar">
  <button class="nav-btn active" id="nav-treino" onclick="goPage('treino')">

  <button class="nav-btn" id="nav-hist" onclick="goPage('hist')">

</div>

        { phase: 'sprint',      name: 'Sprint 3',    dur: '30s',   spd: '10–12 km/h', inc: '1%' },
        { phase: 'recup',       name: 'Recuperação', dur: '90s',   spd: '5–6 km/h',   inc: '1%' },
        { phase: 'desacele',    name: 'Desaceleração', dur: '2 min', spd: '4–5 km/h', inc: '0%' },
      ]
    }
  }
};

const DAYS = ['DOM','SEG','TER','QUA','QUI','SEX','SÁB'];

// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
let currentFicha = 'A';
let currentSession = {}; // { exId: carga }

function getWeekKey() {
  const now = new Date();
  const jan1 = new Date(now.getFullYear(), 0, 1);
  const week = Math.ceil(((now - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${now.getFullYear()}-W${week}`;
}

function loadHistory() {
  return JSON.parse(localStorage.getItem('gym_history') || '[]');
}

function saveHistory(h) {
  localStorage.setItem('gym_history', JSON.stringify(h));
}

function getWeekDone() {
  const h = loadHistory();
  const wk = getWeekKey();
  return h.filter(e => e.week === wk);
}

// ─────────────────────────────────────────
// WEEK STRIP
// ─────────────────────────────────────────
function renderWeekStrip() {
  const row = document.getElementById('days-row');
  const today = new Date().getDay();
  const done = getWeekDone();
  const doneDays = done.map(e => e.dayOfWeek);

  // week label
  const wk = getWeekKey();
  document.getElementById('week-label').textContent = wk;

  row.innerHTML = DAYS.map((d, i) => {
    const isDone = doneDays.includes(i);
    const isToday = i === today;
    let cls = 'day-chip';
    if (isDone) cls += ' done';
    else if (isToday) cls += ' today';
    return `<div class="${cls}">
      <span class="dc-name">${d}</span>
      <span class="dc-dot"></span>
    </div>`;
  }).join('');

  // update tab badges
  const tabs = document.querySelectorAll('.ftab');
  tabs.forEach(t => {
    const ficha = t.textContent.replace(' ✓','').replace('Ficha ','');
    const wasDone = done.some(e => e.ficha === ficha);
    if (wasDone) t.classList.add('completed');
    else t.classList.remove('completed');
  });
}

// ─────────────────────────────────────────
// FICHA RENDER
// ─────────────────────────────────────────
function selectFicha(id, btn) {
  currentFicha = id;
  currentSession = {};
  document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFicha();
  updateDoneBtn();
}

function renderFicha() {
  const f = FICHAS[currentFicha];
  const area = document.getElementById('scroll-area');

  // load saved cargas for today's session from localStorage temp
  const tempKey = `gym_session_${currentFicha}_${todayStr()}`;
  const saved = JSON.parse(localStorage.getItem(tempKey) || '{}');

  let html = '';

  f.sections.forEach(sec => {
    html += `<div class="sec-label">${sec.label}</div>`;
    sec.exercises.forEach(ex => {
      const carga = saved[ex.id] || '';
      html += `
        <div class="ex-row">
          <div class="ex-thumb-wrap">
            <img class="ex-thumb" src="${ex.img}" alt="${ex.name}" onerror="this.closest('.ex-thumb-wrap').classList.add('no-img')">
          </div>
          <div class="ex-info">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-meta"><span class="series">${ex.meta}</span></div>
          </div>
          <div class="carga-wrap">
            <div class="carga-label">Carga</div>
            <div class="carga-input-row">
              <input
                class="carga-input"
                type="number"
                inputmode="decimal"
                placeholder="—"
                value="${carga}"
                data-ex="${ex.id}"
                onchange="saveCarga(this)"
                oninput="saveCarga(this)"
              >
              <span class="carga-unit">kg</span>
            </div>
          </div>
        </div>`;
    });
  });

  const rows = f.cardio.protocol.map(r =>
    `<tr class="phase-${r.phase}"><td>${r.name}</td><td>${r.dur}</td><td>${r.spd}</td><td>${r.inc}</td></tr>`
  ).join('');

  html += `
    <div class="cardio-block">
      <div class="cardio-block-header">
        <div class="cardio-block-title">🏃 ${f.cardio.title}</div>
        <div class="cardio-block-meta">${f.cardio.desc}</div>
      </div>
      <div class="cardio-protocol">
        <table class="hiit-table">
          <thead><tr><th>Fase</th><th>Duração</th><th>Velocidade</th><th>Inclinação</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;

  area.innerHTML = html;
}

function saveCarga(input) {
  const exId = input.dataset.ex;
  const val = input.value;
  const tempKey = `gym_session_${currentFicha}_${todayStr()}`;
  const saved = JSON.parse(localStorage.getItem(tempKey) || '{}');
  saved[exId] = val;
  localStorage.setItem(tempKey, JSON.stringify(saved));
  currentSession[exId] = val;
}

// ─────────────────────────────────────────
// MARK DONE
// ─────────────────────────────────────────
function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function isTodayDone() {
  const done = getWeekDone();
  const today = new Date().getDay();
  return done.some(e => e.ficha === currentFicha && e.dayOfWeek === today);
}

function updateDoneBtn() {
  const btn = document.getElementById('done-btn');
  const icon = document.getElementById('done-icon');
  const txt = document.getElementById('done-text');
  if (isTodayDone()) {
    btn.classList.add('is-done');
    icon.textContent = '✅';
    txt.textContent = `Ficha ${currentFicha} concluída hoje!`;
  } else {
    btn.classList.remove('is-done');
    icon.textContent = '💪';
    txt.textContent = `Marcar Ficha ${currentFicha} como feita`;
  }
}

function marcarFeitо() {
  if (isTodayDone()) return;

  // collect cargas
  const tempKey = `gym_session_${currentFicha}_${todayStr()}`;
  const cargas = JSON.parse(localStorage.getItem(tempKey) || '{}');
  const f = FICHAS[currentFicha];
  const exercises = f.sections.flatMap(s => s.exercises).map(ex => ({
    name: ex.name,
    carga: cargas[ex.id] ? `${cargas[ex.id]} kg` : '—'
  }));

  const entry = {
    id: Date.now(),
    ficha: currentFicha,
    fichaName: f.name,
    date: todayStr(),
    dayOfWeek: new Date().getDay(),
    week: getWeekKey(),
    exercises
  };

  const h = loadHistory();
  h.unshift(entry);
  saveHistory(h);

  showToast(`Ficha ${currentFicha} registrada! 🔥`);
  renderWeekStrip();
  updateDoneBtn();
}

// ─────────────────────────────────────────
// HISTORY
// ─────────────────────────────────────────
function renderHistory() {
  const panel = document.getElementById('history-panel');
  const h = loadHistory();

  if (h.length === 0) {
    panel.innerHTML = `<div class="empty-hist">
      <div class="big">📋</div>
      Nenhum treino registrado ainda.<br>Complete sua primeira ficha!
    </div>`;
    return;
  }

  // group by week
  const byWeek = {};
  h.forEach(e => {
    if (!byWeek[e.week]) byWeek[e.week] = [];
    byWeek[e.week].push(e);
  });

  let html = '';
  Object.keys(byWeek).sort().reverse().forEach(wk => {
    html += `<div class="hist-week">
      <div class="hist-week-title">${wk}</div>`;
    byWeek[wk].forEach(e => {
      const d = new Date(e.date + 'T12:00:00');
      const dateStr = d.toLocaleDateString('pt-BR', { weekday: 'short', day: '2-digit', month: '2-digit' });
      html += `<div class="hist-entry">
        <div class="hist-entry-header">
          <div class="hist-ficha-tag">${e.fichaName}</div>
          <div class="hist-date">${dateStr}</div>
        </div>
        <div class="hist-ex-list">`;
      e.exercises.forEach(ex => {
        html += `<div class="hist-ex-item">
          <span class="hist-ex-name">${ex.name}</span>
          <span class="hist-ex-carga">${ex.carga}</span>
        </div>`;
      });
      html += `</div></div>`;
    });
    html += `</div>`;
  });

  panel.innerHTML = html;
}

function clearHistory() {
  if (!confirm('Apagar todo o histórico?')) return;
  localStorage.removeItem('gym_history');
  Object.keys(localStorage).filter(k => k.startsWith('gym_session')).forEach(k => localStorage.removeItem(k));
  renderHistory();
  renderWeekStrip();
  updateDoneBtn();
}

// ─────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────
function goPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.getElementById('nav-' + id).classList.add('active');
  if (id === 'hist') renderHistory();
}

// ─────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
renderWeekStrip();
renderFicha();
updateDoneBtn();
</script>
</body>
</html>
